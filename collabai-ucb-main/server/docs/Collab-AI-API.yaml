/api/models/process:
    post:
      tags:
        - Huggingface Models
      summary: Process input data using a specified model
      description: |
        This endpoint processes input data using the specified model. It supports various model types including:
        - text-to-image
        - image-to-text
        - text-generation
        - image-classification
        - text-classification
        
        The request body must include the modelName and inputData.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - modelName
                - inputData
              properties:
                modelName:
                  type: string
                  description: The name of the model to use for processing
                  example: "gpt-neo"
                inputData:
                  type: string
                  description: Input data for the model. Could be text or base64 image data or URL depending on the model type.
                  example: "Hello, world!"
      responses:
        '200':
          description: Processing successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  result:
                    type: string
                    description: Result of the model processing. For image outputs, it will be base64 encoded image data URL.
                    example: "data:image/jpeg;base64,/9j/4AAQSkZJRgABAQEASABIAAD..."
        '400':
          description: Bad request due to missing parameters or invalid input
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  result:
                    type: string
                    nullable: true
                    example: null
                  message:
                    type: string
                    example: "Model name and input data are required."
        '404':
          description: Model not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  result:
                    type: string
                    nullable: true
                    example: null
                  message:
                    type: string
                    example: "Model not found."
        '409':
          description: Conflict (not specifically in your code, but common for model availability, can omit)
        '500':
          description: Internal server error during processing
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  result:
                    type: string
                    nullable: true
                    example: null
                  message:
                    type: string
                    example: "Internal server error occurred."

