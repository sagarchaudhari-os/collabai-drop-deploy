##------------------------------Googledrive api's -----------------------------------------------------

/api/google-auth/google-drive-to-knowledgebase:
    post:
      tags:
        - Google Drive
      summary: Transfer Google Drive file metadata to knowledge base
      description: Accepts Google Drive file info, retrieves metadata, formats filenames, and stores the details into the knowledge base.
      operationId: googleDriveInfoToKnowledgeBase
      security:
        - bearerAuth: []  # Requires authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - userId
                - fileDetails
              properties:
                userId:
                  type: string
                  example: "user_abc123"
                fileDetails:
                  type: array
                  items:
                    type: object
                    required:
                      - fileId
                      - name
                      - url
                    properties:
                      fileId:
                        type: string
                        example: "1A2B3Cxyz"
                      name:
                        type: string
                        example: "Report Q1"
                      url:
                        type: string
                        example: "https://drive.google.com/file/d/1A2B3Cxyz/view"
                      parentId:
                        type: string
                        example: "folder_xyz"
      responses:
        '200':
          description: File metadata successfully added to knowledge base
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        fileId:
                          type: string
                          example: "1A2B3Cxyz"
                        data:
                          type: object
                          description: Metadata saved in the knowledge base (DB structure dependent)
                  message:
                    type: string
                    example: File added to knowledge base successfully
        '400':
          description: No files provided
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: No file is sent
        '403':
          description: Google Drive not connected
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Connect Google Drive first
        '500':
          description: File download or processing failed
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Could not download the file


/api/google-auth/:
