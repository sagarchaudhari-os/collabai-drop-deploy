  /api/email-domains:
    get:
      summary: Retrieve all email domains
      description: This endpoint retrieves a list of all email domains from the database.
      responses:
        '200':
          description: Successfully retrieved email domains
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    _id:
                      type: string
                      description: The unique identifier of the email domain.
                      example: "60d5f484e1f1c724b0c5d8b0"
                    companyName:
                      type: string
                      description: The name of the company associated with the email domain.
                      example: "Example Corp"
                    emailDomain:
                      type: string
                      description: The email domain.
                      example: "example.com"
                    createdAt:
                      type: string
                      format: date-time
                      description: The timestamp when the email domain was created.
                      example: "2023-01-01T00:00:00Z"
                    updatedAt:
                      type: string
                      format: date-time
                      description: The timestamp when the email domain was last updated.
                      example: "2023-01-01T00:00:00Z"
        '400':
          description: Bad request, failed to fetch email domains

  /api/email-domains/authorize:
    post:
      summary: Authorize a new email domain
      description: This endpoint allows an authenticated user to authorize a new email domain.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                companyName:
                  type: string
                  description: The name of the company.
                  example: "Example Corp"
                emailDomain:
                  type: string
                  description: The email domain to authorize.
                  example: "example.com"
      responses:
        '201':
          description: Email domain successfully authorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Email domain authorized successfully"
                  data:
                    type: object
                    properties:
                      _id:
                        type: string
                        example: "60d5f484e1f1c724b0c5d8b0"
                      companyName:
                        type: string
                        example: "Example Corp"
                      emailDomain:
                        type: string
                        example: "example.com"
        '400':
          description: Bad request, failed to authorize email domain

  /api/email-domains/{id}:
    get:
      summary: Retrieve an email domain by ID
      description: This endpoint retrieves a specific email domain using its ID.
      parameters:
        - name: id
          in: path
          required: true
          description: The unique identifier of the email domain.
          schema:
            type: string
      responses:
        '200':
          description: Successfully retrieved email domain
          content:
            application/json:
              schema:
                type: object
                properties:
                  _id:
                    type: string
                    example: "60d5f484e1f1c724b0c5d8b0"
                  companyName:
                    type: string
                    example: "Example Corp"
                  emailDomain:
                    type: string
                    example: "example.com"
        '404':
          description: Email domain not found
        '400':
          description: Bad request, failed to fetch email domain

    patch:
      summary: Update an email domain by ID
      description: This endpoint updates a specific email domain using its ID.
      parameters:
        - name: id
          in: path
          required: true
          description: The unique identifier of the email domain.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                companyName:
                  type: string
                  description: The name of the company.
                  example: "Updated Corp"
                emailDomain:
                  type: string
                  description: The updated email domain.
                  example: "updated.com"
      responses:
        '200':
          description: Email domain successfully updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Email domain updated successfully"
                  data:
                    type: object
                    properties:
                      _id:
                        type: string
                        example: "60d5f484e1f1c724b0c5d8b0"
                      companyName:
                        type: string
                        example: "Updated Corp"
                      emailDomain:
                        type: string
                        example: "updated.com"
        '404':
          description: Email domain not found
        '400':
          description: Bad request, failed to update email domain

    delete:
      summary: Delete an email domain by ID
      description: This endpoint deletes a specific email domain using its ID.
      parameters:
        - name: id
          in: path
          required: true
          description: The unique identifier of the email domain.
          schema:
            type: string
      responses:
        '200':
          description: Email domain successfully deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Email domain deleted successfully"
        '404':
          description: Email domain not found
        '400':
          description: Bad request, failed to delete email domain


