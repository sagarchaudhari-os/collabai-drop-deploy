##------------------------------modelRoutes api's -----------------------------------------------------

/api/models:
    post:
      tags:
        - Huggingface Models
      summary: Add a new Huggingface model
      description: Creates a new Huggingface model with optional image upload.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                image_url:
                  type: string
                  format: binary
                  description: Optional image file for the model
                nickname:
                  type: string
                  example: "My Model"
                name:
                  type: string
                  example: "bert-base-uncased"
                inputOutputType:
                  type: string
                  example: "text-to-text"
                type:
                  type: string
                  example: "huggingface"
                temperature:
                  type: number
                  example: 0.7
                maxToken:
                  type: integer
                  example: 512
              required:
                - nickname
                - name
                - inputOutputType
                - type
                - temperature
                - maxToken
      responses:
        '201':
          description: Model created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      _id:
                        type: string
                        example: "66561920a7236c0a1f038e44"
                      nickname:
                        type: string
                        example: "My Model"
                      name:
                        type: string
                        example: "bert-base-uncased"
                      image_url:
                        type: string
                        example: "https://s3.amazonaws.com/yourbucket/model-image.jpg"
                      inputOutputType:
                        type: string
                        example: "text-to-text"
                      type:
                        type: string
                        example: "huggingface"
                      temperature:
                        type: number
                        example: 0.7
                      maxToken:
                        type: integer
                        example: 512
        '400':
          description: Missing required fields
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: "Required model details are missing."
        '500':
          description: Internal server error or image upload error
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: "Error uploading image"

/api/models/check-field/{field}/{value}:
    get:
      tags:
        - Huggingface Models
      summary: Check if a specific model field value is available
      description: |
        Checks if a given field value (e.g., nickname or name) for a model is already taken. Case-insensitive exact match.
      parameters:
        - in: path
          name: field
          required: true
          schema:
            type: string
          description: The field to check (e.g., nickname, name)
          example: nickname
        - in: path
          name: value
          required: true
          schema:
            type: string
          description: The value to check for availability
          example: "my-unique-model"
      responses:
        '200':
          description: Field value is available
          content:
            application/json:
              schema:
                type: object
                properties:
                  msg:
                    type: string
                    example: "Model nickname is available."
        '400':
          description: Field or value missing from request
          content:
            application/json:
              schema:
                type: object
                properties:
                  msg:
                    type: string
                    example: "Field and value are required."
        '409':
          description: Field value is already taken
          content:
            application/json:
              schema:
                type: object
                properties:
                  msg:
                    type: string
                    example: "Model nickname already taken."
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  msg:
                    type: string
                    example: "Internal Server Error"


