/api/integration/service/oauth/connect:
    post:
      summary: Initiate OAuth connection for a service
      tags:
        - Integration
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - service_id
                - userId
                - authFields
                - authenticateFields
                - oauthurl
                - tokenurl
                - baseurl
                - type
                - contentType
              properties:
                service_id:
                  type: string
                  example: "64a7e5f4b0cf4e2be6d65a9f"
                  description: ID of the service to connect
                userId:
                  type: string
                  example: "user_123"
                  description: ID of the user initiating the OAuth flow
                authFields:
                  type: array
                  description: Key-value pairs required by the OAuth service
                  items:
                    type: object
                    properties:
                      keyName:
                        type: string
                        example: "client_id"
                      keyValue:
                        type: string
                        example: "abc123xyz"
                authenticateFields:
                  type: array
                  description: Additional fields required for authentication
                  items:
                    type: object
                    example:
                      keyName: "scope"
                      keyValue: "read write"
                oauthurl:
                  type: string
                  format: uri
                  example: "https://auth.example.com/oauth/authorize"
                  description: OAuth authorization URL
                tokenurl:
                  type: string
                  format: uri
                  example: "https://auth.example.com/oauth/token"
                  description: URL to exchange code for token
                baseurl:
                  type: string
                  format: uri
                  example: "https://api.example.com"
                  description: Base API URL of the external service
                type:
                  type: string
                  example: "OAuth2"
                  description: Type of OAuth integration
                contentType:
                  type: string
                  example: "application/json"
                  description: Content-Type header value used during token exchange
      responses:
        '200':
          description: Authorization URL successfully generated
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Redirect the user to this URL to get the authorization code
                  authorizationUrl:
                    type: string
                    example: "https://auth.example.com/oauth/authorize?client_id=abc123xyz&state=encrypted_value"
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Internal Server Error

/api/integration/service/oauth/connect:
    get:
      summary: Handle OAuth redirect and exchange code for tokens
      tags:
        - Integration
      parameters:
        - in: query
          name: code
          schema:
            type: string
            example: "4/0AX4XfWgF7..."
          required: true
          description: Authorization code returned by the OAuth provider
        - in: query
          name: state
          schema:
            type: string
            example: "U2FsdGVkX1+..."
          required: true
          description: Encrypted state object passed from the initial OAuth request
      responses:
        '302':
          description: Redirects to frontend after successful token exchange and storage
          headers:
            Location:
              description: Frontend URL the user is redirected to
              schema:
                type: string
                example: "https://yourfrontend.com/profile"
        '400':
          description: Bad Request due to missing parameters or invalid client credentials
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Authorization code is missing
        '500':
          description: Internal server error during token exchange or state decryption
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Error exchanging authorization code for tokens


