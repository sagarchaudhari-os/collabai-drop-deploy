/api/integration/service/add:
    post:
      summary: Add a new service
      tags:
        - Integration
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: Service name
                  example: "Google Drive"
                slug:
                  type: string
                  description: Unique slug identifier
                  example: "google-drive"
                description:
                  type: string
                  description: Service description
                  example: "Cloud storage service by Google"
                is_active:
                  type: boolean
                  description: Service active status (ignored on create, default false)
                  example: false
                is_google_app:
                  type: boolean
                  description: Indicates if the service is a Google app
                  example: true
                oauthurl:
                  type: string
                  description: OAuth authorization URL
                  example: "https://accounts.google.com/o/oauth2/auth"
                tokenurl:
                  type: string
                  description: OAuth token URL
                  example: "https://oauth2.googleapis.com/token"
                baseurl:
                  type: string
                  description: Base URL for API calls
                  example: "https://www.googleapis.com/drive/v3"
                authType:
                  type: string
                  description: Authentication type (e.g., OAuth, Basic)
                  example: "OAuth"
                authFields:
                  oneOf:
                    - type: string
                      description: JSON string of auth fields
                      example: '[{"keyName":"client_id","keyValue":"abc123"},{"keyName":"scope","keyValue":"read"}]'
                    - type: array
                      items:
                        type: object
                        properties:
                          keyName:
                            type: string
                            example: "client_id"
                          keyValue:
                            type: string
                            example: "abc123"
                authenticateFields:
                  oneOf:
                    - type: string
                      description: JSON string of authenticate fields
                      example: '[{"keyName":"client_secret","keyValue":"secret"}]'
                    - type: array
                      items:
                        type: object
                        properties:
                          keyName:
                            type: string
                            example: "client_secret"
                          keyValue:
                            type: string
                            example: "secret"
                headers:
                  oneOf:
                    - type: string
                      description: JSON string of headers
                      example: '[{"keyName":"Content-Type","keyValue":"application/json"}]'
                    - type: array
                      items:
                        type: object
                        properties:
                          keyName:
                            type: string
                            example: "Content-Type"
                          keyValue:
                            type: string
                            example: "application/json"
                type:
                  type: string
                  description: Authorization type
                  example: "Bearer"
                contentType:
                  type: string
                  description: Content-Type header for OAuth token request
                  example: "application/x-www-form-urlencoded"
                userId:
                  type: string
                  description: ID of the user adding the service
                  example: "609b8a2f5f3c2a0015f6d9b7"
                service_icon:
                  type: string
                  format: binary
                  description: Service icon file upload
      responses:
        '201':
          description: Service added successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Service added successfully"
                  data:
                    type: object
                    properties:
                      _id:
                        type: string
                        example: "60af4c5e2b7a123456789abc"
                      service_name:
                        type: string
                        example: "Google Drive"
                      slug:
                        type: string
                        example: "google-drive"
                      description:
                        type: string
                        example: "Cloud storage service by Google"
                      is_active:
                        type: boolean
                        example: false
                      is_google_app:
                        type: boolean
                        example: true
                      service_icon:
                        type: string
                        example: "uploads/service_icons/icon123.png"
                      oauthurl:
                        type: string
                        example: "https://accounts.google.com/o/oauth2/auth"
                      tokenurl:
                        type: string
                        example: "https://oauth2.googleapis.com/token"
                      baseurl:
                        type: string
                        example: "https://www.googleapis.com/drive/v3"
                      authType:
                        type: string
                        example: "OAuth"
                      authFields:
                        type: array
