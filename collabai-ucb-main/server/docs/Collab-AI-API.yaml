/api/folder-chats/delete-system-files:
    post:
      tags:
        - Folder Chats
      summary: Delete multiple files by file IDs from a specific project folder
      description: >
        Deletes multiple files from the specified folder based on the given `fileIdList`. This includes deleting from OpenAI,
        associated vector stores, and updating the MongoDB document by removing file entries and updating selectedFileKeys.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                projectId:
                  type: string
                  description: The ID of the project folder
                  example: "665000fa3924dd63b0b342c1"
                fileIdList:
                  type: array
                  description: List of file IDs to delete (must exist in `fileInfo`)
                  items:
                    type: string
                  example: ["file-id-123", "file-id-456"]
              required:
                - projectId
                - fileIdList
      responses:
        '200':
          description: Files deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Files deleted successfully"
                  summary:
                    type: object
                    properties:
                      deletedFiles:
                        type: array
                        items:
                          type: string
                        example: ["file-id-123", "file-id-456"]
                      vectorStoresUpdated:
                        type: array
                        items:
                          type: string
                        example: ["vector-store-abc"]
                      filesNotFound:
                        type: array
                        items:
                          type: string
                        example: ["file-id-789"]
                      databaseUpdate:
                        type: object
                        description: MongoDB update result
        '404':
          description: Folder not found or no valid files to delete
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "No valid files found to delete"
                  filesNotFound:
                    type: array
                    items:
                      type: string
                    example: ["file-id-789"]
        '500':
          description: Internal server error during file deletion
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Failed to delete files: Unexpected error"

