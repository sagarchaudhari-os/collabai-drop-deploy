##------------------------------GoogleSheet api's -----------------------------------------------------

/api/google-sheet/write-to-sheet:
    post:
      summary: Write data to a Google Sheet
      tags:
        - Google Sheets
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - userId
                - spreadsheetId
                - sheetName
                - data
              properties:
                userId:
                  type: string
                  description: ID of the user performing the operation
                  example: "user_12345"
                spreadsheetId:
                  type: string
                  description: ID of the Google Spreadsheet
                  example: "1BxiMVs0XRA5nFMdKvBdBZjgmUUqptlbs74OgvE2upms"
                sheetName:
                  type: string
                  description: Name of the sheet/tab within the spreadsheet
                  example: "Sheet1"
                data:
                  description: Data to write to the sheet. Can be an array of objects or a CSV string.
                  oneOf:
                    - type: string
                      example: "name,age\nAlice,30\nBob,25"
                    - type: array
                      items:
                        type: object
                        additionalProperties: true
                      example:
                        - name: "Alice"
                          age: 30
                        - name: "Bob"
                          age: 25
                cronJob:
                  type: boolean
                  description: Flag indicating if request is from a cron job (optional)
                  default: false
      responses:
        '200':
          description: Sheet updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Sheet updated successfully"
        '400':
          description: Invalid data format
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Invalid data format"
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Unauthorized error"
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  errorMessage:
                    type: string
                    example: "Internal server error"
                  message:
                    type: string
                    example: "Some error message"

