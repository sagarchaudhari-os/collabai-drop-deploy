          description: Failed to store credential
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Action failed"

/api/web-crawl/crawl:
    post:
      summary: Crawl given URL and subpages
      tags:
        - Web Crawl
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - url
                - userId
              properties:
                url:
                  type: string
                  format: uri
                  example: "https://example.com"
                  description: URL to crawl
                limit:
                  type: integer
                  default: 1
                  description: Number of pages to crawl including subpages (default is 1)
                userId:
                  type: string
                  example: "12345"
                  description: User identifier
                sync:
                  type: boolean
                  default: false
                  description: Whether to sync the crawled data to knowledge base
                key:
                  type: string
                  nullable: true
                  description: Optional key for authorization (not required in your code)
      responses:
        '200':
          description: Crawl completed successfully and data imported
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    description: Crawled data storage result
                  message:
                    type: string
                    example: "Successfully imported the URL"
        '400':
          description: Bad request or crawl failed
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Failed to initiate crawl"
        '500':
          description: Internal server error during crawl process
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Request failed. Check your credit score."
                  error:
                    type: string
                    description: Detailed error message or response from upstream service

