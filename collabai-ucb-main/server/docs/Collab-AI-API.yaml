/api/folder-chats/files:
    post:
      tags:
        - Folder Chats
      summary: Upload files to a folder chat
      description: Upload multiple files to a specific folder chat with optional thread and message references.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                userId:
                  type: string
                  description: ID of the user uploading the files
                  example: "60f8a3f9d2e4a233e4b1c123"
                folderId:
                  type: string
                  description: ID of the folder chat
                  example: "60f8a3f9d2e4a233e4b1c456"
                threadId:
                  type: string
                  description: Optional thread ID related to the files
                  example: "60f8a3f9d2e4a233e4b1c789"
                  nullable: true
                msgId:
                  type: string
                  description: Optional message ID related to the files
                  example: "60f8a3f9d2e4a233e4b1c999"
                  nullable: true
                waitingFile:
                  type: boolean
                  description: Flag to indicate if files are waiting files (default false)
                  example: false
                fileNameList:
                  type: string
                  description: JSON string of file metadata list (keys of files)
                  example: '[{"key":"fileKey1"},{"key":"fileKey2"}]'
                files:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: Files to upload (max 21 files)
                avatar:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: Optional avatar files (max 2 files)
              required:
                - userId
                - folderId
                - files
      responses:
        '200':
          description: Files uploaded successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "File Uploaded Successfully"
        '400':
          description: Bad request, validation error or missing fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - authentication required or failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error during file upload process
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

/api/folder-chats/waiting-files:
    post:
      tags:
        - Folder Chats
      summary: Upload waiting files (image and non-image) to a folder chat
      description: >
        Uploads files to a folder chat as waiting files. Supports image files (jpeg, png, gif, webp) up to 5MB
        which are converted to base64, and non-image files processed with OpenAI and vector store.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                userId:
                  type: string
                  description: ID of the user uploading files
                  example: "60f8a3f9d2e4a233e4b1c123"
                folderId:
                  type: string
                  description: ID of the folder chat
                  example: "60f8a3f9d2e4a233e4b1c456"
                threadId:
                  type: string
                  description: Optional thread ID related to the files
                  example: "60f8a3f9d2e4a233e4b1c789"
                  nullable: true
                msgId:
                  type: string
                  description: Optional message ID related to the files
                  example: "60f8a3f9d2e4a233e4b1c999"
                  nullable: true
                info:
                  type: string
                  description: JSON string containing additional info (e.g., uid)
                  example: '{"uid":"unique-id-123"}'
                files:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: Files to upload (max 21 files)
                avatar:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: Optional avatar files (max 2 files)
              required:
                - userId
                - folderId
                - files
      responses:
        '200':
          description: Files uploaded successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "File Uploaded Successfully"
                  summary:
                    type: object
                    properties:
                      totalFiles:
                        type: integer
                        example: 5
                      imageFiles:
                        type: integer
                        example: 2
                      nonImageFiles:
                        type: integer
                        example: 3
                      fileInfo:
                        type: array
                        items:
                          type: object
                          properties:
                            uid:
                              type: string
                              example: "unique-id-123"
                            fileName:
                              type: string
                              example: "example.pdf"
                            fileId:
                              type: string
                              nullable: true
                              example: "file-abc123"
                            vectorStoreId:
                              type: string
                              nullable: true
                              example: "vector-store-xyz456"
                            threadId:
                              type: string
                              nullable: true
                              example: null
                            msgId:
                              type: string
                              nullable: true
                              example: null
                            systemFile:
                              type: boolean
                              example: false
                            isImage:
                              type: boolean
                              example: true
                            base64Data:
                              type: string
                              nullable: true
                              description: Base64 string for images
                            mimeType:
                              type: string
                              example: "image/png"
                            size:
                              type: integer
                              example: 123456
                            originalName:
                              type: string
                              example: "photo.png"
        '400':
          description: Bad request - invalid files or parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - authentication failed or missing token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error during file processing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

