                fireCrawlKey:
                  type: string
                  example: "abc123firecrawlkey"
                  description: Fire Crawl API key
      responses:
        '200':
          description: Credential stored successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  responseOfFireCrawlKeyStore:
                    type: object
                    description: Result from createOrUpdateAppAuthService
                  message:
                    type: string
                    example: "Added in file list successfully"
